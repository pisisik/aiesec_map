<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIESEC Bremen — Card Front</title>
<link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,300;0,400;0,700;0,900;1,300;1,700&family=Raleway:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #d0d0d0;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Raleway', sans-serif;
  }

  /* Standard postcard: 148mm x 105mm — rendered at 4px/mm = 592x420px */
  .card {
    width: 592px;
    height: 420px;
    background: #FFF5F2;
    border-radius: 10px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
  }

  /* TOP BAR */
  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 18px 8px;
    background: #FFF5F2;
    border-bottom: 1px solid rgba(0,0,0,0.07);
    flex-shrink: 0;
  }

  .brand {
    display: flex;
    flex-direction: column;
  }
  .brand-name {
    font-family: 'Lato', sans-serif;
    font-weight: 900;
    font-size: 13px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #1a1020;
    line-height: 1;
  }
  .brand-name span { color: #0037E3; }
  .brand-sub {
    font-size: 7px;
    color: #9a8a85;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-top: 2px;
  }

  /* NFC badge */
  .nfc-badge {
    display: flex;
    align-items: center;
    gap: 7px;
    background: rgba(0,55,227,0.06);
    border: 1px solid rgba(0,55,227,0.18);
    border-radius: 20px;
    padding: 5px 11px 5px 8px;
  }
  .nfc-icon {
    width: 22px;
    height: 22px;
    flex-shrink: 0;
  }
  .nfc-text {
    font-size: 8px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: #0037E3;
    line-height: 1.3;
  }

  /* TITLE */
  .title-area {
    text-align: center;
    padding: 8px 18px 4px;
    flex-shrink: 0;
  }
  .title-area h1 {
    font-family: 'Lato', sans-serif;
    font-weight: 900;
    font-size: 22px;
    color: #1a1020;
    line-height: 1.05;
    letter-spacing: -0.01em;
  }
  .title-area h1 em {
    font-weight: 300;
    font-style: italic;
    color: #0037E3;
  }

  /* MAP */
  .map-wrap {
    flex: 1;
    padding: 0 10px 8px;
    position: relative;
    overflow: hidden;
  }

  #map {
    width: 100%;
    height: 100%;
    display: block;
  }

  .land-blue   { fill: #0037E3; stroke: #fff; stroke-width: 0.5; }
  .land-red    { fill: #F95440; stroke: #fff; stroke-width: 0.5; }
  .land-teal   { fill: #00C1AE; stroke: #fff; stroke-width: 0.5; }
  .land-purple { fill: #7552CC; stroke: #fff; stroke-width: 0.5; }
  .land-orange { fill: #F48024; stroke: #fff; stroke-width: 0.5; }
  .land-yellow { fill: #FFC345; stroke: #fff; stroke-width: 0.5; }
  .land-dark   { fill: #92565E; stroke: #fff; stroke-width: 0.5; }

  .dot-ring {
    animation: pulse 2.5s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 0.3; }
    50%      { opacity: 0; }
  }

  .city-lbl {
    font-family: 'Raleway', sans-serif;
    font-size: 5.5px;
    font-weight: 700;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    fill: #fff;
    pointer-events: none;
  }

  /* BOTTOM TAG */
  .bottom-tag {
    position: absolute;
    bottom: 10px;
    right: 14px;
    font-size: 7px;
    font-weight: 500;
    color: #bbb;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
</style>
</head>
