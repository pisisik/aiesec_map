
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: transparent; }
.map-wrap { position: relative; width: 100%; font-family: var(--font-sans); }
.map-title { font-size: 13px; font-weight: 500; color: #0037E3; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 6px; padding: 0 4px; }
svg#worldmap { width: 100%; height: auto; display: block; }
.country { fill: #e8edf7; stroke: #fff; stroke-width: 0.5; }
.city-dot { cursor: pointer; transition: transform 0.15s; }
.city-dot:hover { transform-origin: center; transform: scale(1.5); }
.city-dot circle.outer { opacity: 0.25; }
.tooltip-card {
  position: absolute;
  background: #fff;
  border: 1.5px solid #0037E3;
  border-radius: 10px;
  padding: 14px 16px;
  min-width: 220px;
  max-width: 260px;
  box-shadow: 0 4px 20px rgba(0,55,227,0.12);
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.18s;
  z-index: 10;
}
.tooltip-card.visible { opacity: 1; pointer-events: auto; }
.tooltip-city { font-size: 15px; font-weight: 500; color: #0037E3; margin-bottom: 2px; }
.tooltip-country { font-size: 11px; color: #888; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.06em; }
.project-list { list-style: none; }
.project-item {
  display: flex; align-items: flex-start; gap: 8px;
  padding: 7px 0;
  border-bottom: 0.5px solid #e8edf7;
  font-size: 12px;
}
.project-item:last-child { border-bottom: none; padding-bottom: 0; }
.project-type {
  display: inline-block;
  font-size: 9px;
  font-weight: 500;
  padding: 2px 6px;
  border-radius: 20px;
  white-space: nowrap;
  min-width: 60px;
  text-align: center;
  margin-top: 1px;
}
.type-vol { background: #F95440; color: #fff; }
.type-int { background: #0037E3; color: #fff; }
.type-teach { background: #7552CC; color: #fff; }
.project-name { color: #222; line-height: 1.3; }
.project-link { color: #0037E3; font-size: 10px; margin-top: 2px; text-decoration: none; display: block; }
.project-link:hover { text-decoration: underline; }
.close-btn {
  position: absolute; top: 8px; right: 10px;
  font-size: 16px; cursor: pointer;
  color: #aaa; background: none; border: none;
  line-height: 1; pointer-events: auto;
}
.legend {
  display: flex; gap: 12px; flex-wrap: wrap;
  padding: 8px 4px 0;
}
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--color-text-secondary); }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; }
</style>

<script>
const data = {
  italien: {
    city: "Italien", country: "Europa",
    projects: [

      { name: "Global Classroom (Torino)", type: "vol", url: "https://aiesec.de/project/global-classroom-torino-italy" },
      { name: "Green Leaders", type: "vol", url: "https://aiesec.de/project/green-leaders-italy" },
      { name: "Youth 4 Impact", type: "vol", url: "https://aiesec.de/project/youth-4-impact-italy" },
      { name: "Fingerprint", type: "vol", url: "https://aiesec.de/project/fingerprint-italy" },
    ]
  },
  griechenland: {
    city: "Griechenland", country: "Europa",
    projects: [
      { name: "Rooted", type: "vol", url: "https://aiesec.de/project/rooted-greece" },
      { name: "Junior Marketing Manager", type: "int", url: "https://aiesec.de/project/junior-marketing-greece" },
      { name: "Frontend Developer", type: "int", url: "https://aiesec.de/project/frontend-developer-greece" },
    ]
  },
  spanien: {
    city: "Spanien", country: "Europa",
    projects: [
      { name: "Teacher / Assistant Teacher", type: "teach", url: "https://aiesec.de/project/teacher-assistant-teacher-spain" },
    ]
  },
  indien: {
    city: "Indien", country: "Asien",
    projects: [
      { name: "Sports Teacher", type: "teach", url: "https://aiesec.de/project/sports-teacher-india" },
      { name: "Dance and Music Teacher", type: "teach", url: "https://aiesec.de/project/dance-and-music-teacher-india" },
    ]
  },
  srilanka: {
    city: "Sri Lanka", country: "Asien",
    projects: [
      { name: "Aquatica", type: "vol", url: "https://aiesec.de/project/aquatica-sri-lanka" },
    ]
  },
  tunesien: {
    city: "Tunesien", country: "Afrika",
    projects: [
      { name: "German Teacher", type: "teach", url: "https://aiesec.de/project/german-teacher-tunisia" },
    ]
  },
  brasilien: {
    city: "Brasilien", country: "Südamerika",
    projects: [
      { name: "Alle Projekte ansehen", type: "vol", url: "https://aiesec.de/location/brasilien" },
    ]
  },
  rumanien: {
    city: "Rumänien", country: "Europa",
    projects: [
      { name: "Alle Projekte ansehen", type: "vol", url: "https://aiesec.de/location/rumaenien" },
    ]
  },
  portugal: {
    city: "Portugal", country: "Europa",
    projects: [
      { name: "Alle Projekte ansehen", type: "vol", url: "https://aiesec.de/location/portugal" },
    ]
  },
  egypt: {
    city: "Ägypten", country: "Afrika",
    projects: [
      { name: "Alle Projekte ansehen", type: "vol", url: "https://aiesec.de/location/egypt" },
    ]
  },
};

const typeLabel = { vol: "Freiwillig", int: "Praktikum", teach: "Lehrpraktikum" };
const typeClass = { vol: "type-vol", int: "type-int", teach: "type-teach" };

function showTooltip(event, key) {
  const d = data[key];
  if (!d) return;
  document.getElementById('tt-city').textContent = d.city;
  document.getElementById('tt-country').textContent = d.country;
  const list = document.getElementById('tt-projects');
  list.innerHTML = d.projects.map(p => `
    <li class="project-item">
      <div>
        <span class="project-type ${typeClass[p.type]}">${typeLabel[p.type]}</span>
      </div>
      <div>
        <div class="project-name">${p.name}</div>
        <a class="project-link" href="${p.url}" target="_blank">Mehr erfahren →</a>
      </div>
    </li>
  `).join('');

  const tt = document.getElementById('tooltip');
  tt.classList.add('visible');

  const svgEl = document.getElementById('worldmap');
  const svgRect = svgEl.getBoundingClientRect();
  const mapWrap = svgEl.parentElement;
  const wrapRect = mapWrap.getBoundingClientRect();

  const clickX = event.clientX - wrapRect.left;
  const clickY = event.clientY - wrapRect.top;

  let left = clickX + 10;
  let top = clickY - 20;
  if (left + 260 > wrapRect.width) left = clickX - 270;
  if (top < 0) top = 10;

  tt.style.left = left + 'px';
  tt.style.top = top + 'px';
}

function hideTooltip() {
  document.getElementById('tooltip').classList.remove('visible');
}

document.getElementById('worldmap').addEventListener('click', function(e) {
  if (!e.target.closest('.city-dot')) hideTooltip();
});
</script>
