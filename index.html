<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIESEC — Projekte & Praktika weltweit</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --blue: #0037E3;
    --teal: #00C1AE;
    --orange: #F48024;
    --red: #F95440;
    --purple: #7552CC;
    --yellow: #FFC345;
    --dark: #1a1a2e;
    --ocean: #b8d4e8;
    --land: #e8eedc;
    --land-hover: #d4e0c4;
    --white: #ffffff;
    --gray: #f4f5f7;
    --text: #1a1a2e;
    --muted: #6b7280;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--dark);
    color: var(--white);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HEADER */
  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 40px;
    background: rgba(26,26,46,0.85);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }

  .logo {
    display: flex; align-items: center; gap: 10px;
  }
  .logo-mark {
    width: 36px; height: 36px;
    background: var(--blue);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'DM Serif Display', serif;
    font-size: 18px;
    font-style: italic;
    color: #fff;
  }
  .logo-text {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .logo-sub {
    font-size: 11px;
    color: rgba(255,255,255,0.45);
    letter-spacing: 0.06em;
    margin-top: 1px;
  }

  nav { display: flex; gap: 8px; }
  nav a {
    text-decoration: none;
    font-size: 12px;
    font-weight: 500;
    padding: 7px 14px;
    border-radius: 20px;
    letter-spacing: 0.04em;
    transition: all 0.2s;
  }
  .nav-link { color: rgba(255,255,255,0.6); }
  .nav-link:hover { color: #fff; background: rgba(255,255,255,0.08); }
  .nav-cta {
    background: var(--blue);
    color: #fff;
  }
  .nav-cta:hover { background: #0029b0; }

  /* HERO */
  .hero {
    padding: 130px 40px 40px;
    text-align: center;
    position: relative;
  }
  .hero-tag {
    display: inline-block;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--teal);
    border: 1px solid rgba(0,193,174,0.3);
    padding: 5px 14px;
    border-radius: 20px;
    margin-bottom: 20px;
  }
  h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(32px, 5vw, 56px);
    font-weight: 400;
    line-height: 1.1;
    margin-bottom: 14px;
    color: #fff;
  }
  h1 em {
    font-style: italic;
    color: var(--teal);
  }
  .hero-sub {
    font-size: 15px;
    color: rgba(255,255,255,0.5);
    max-width: 480px;
    margin: 0 auto 30px;
    line-height: 1.6;
  }

  /* LEGEND */
  .legend {
    display: flex;
    gap: 20px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 30px;
  }
  .legend-item {
    display: flex; align-items: center; gap: 7px;
    font-size: 12px;
    color: rgba(255,255,255,0.6);
  }
  .legend-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* MAP CONTAINER */
  .map-container {
    position: relative;
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 20px 60px;
  }

  #worldmap {
    width: 100%;
    height: auto;
    display: block;
    filter: drop-shadow(0 20px 60px rgba(0,0,0,0.5));
  }

  .country {
    fill: #2a3a52;
    stroke: #1a1a2e;
    stroke-width: 0.6;
    transition: fill 0.2s;
  }

  /* CITY DOTS */
  .city-group {
    cursor: pointer;
  }
  .city-pulse {
    transform-origin: center;
    animation: pulse 2.5s ease-in-out infinite;
  }
  .city-pulse-2 {
    transform-origin: center;
    animation: pulse 2.5s ease-in-out infinite 0.8s;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.3; r: 14; }
    50% { opacity: 0; r: 20; }
  }
  .city-core {
    transition: r 0.2s, filter 0.2s;
  }
  .city-group:hover .city-core {
    filter: brightness(1.3);
  }
  .city-label {
    font-family: 'DM Sans', sans-serif;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    pointer-events: none;
    fill: rgba(255,255,255,0.8);
  }

  /* TOOLTIP / PANEL */
  .panel {
    position: fixed;
    top: 50%;
    right: -400px;
    transform: translateY(-50%);
    width: 340px;
    background: #fff;
    color: var(--text);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 30px 80px rgba(0,0,0,0.4);
    transition: right 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 200;
  }
  .panel.open {
    right: 30px;
  }
  .panel-header {
    padding: 22px 22px 18px;
    position: relative;
  }
  .panel-close {
    position: absolute;
    top: 16px; right: 16px;
    width: 28px; height: 28px;
    border-radius: 50%;
    background: #f0f0f0;
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    color: #888;
    transition: background 0.15s;
  }
  .panel-close:hover { background: #e0e0e0; }
  .panel-flag {
    font-size: 32px;
    line-height: 1;
    margin-bottom: 8px;
  }
  .panel-country {
    font-family: 'DM Serif Display', serif;
    font-size: 26px;
    font-weight: 400;
    color: var(--text);
    margin-bottom: 4px;
  }
  .panel-region {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
  }
  .panel-stats {
    display: flex; gap: 12px;
    padding: 12px 22px;
    background: var(--gray);
    border-top: 1px solid #eee;
    border-bottom: 1px solid #eee;
  }
  .stat {
    text-align: center; flex: 1;
  }
  .stat-num {
    font-size: 20px;
    font-weight: 600;
    color: var(--blue);
  }
  .stat-label {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-top: 2px;
  }
  .panel-projects {
    padding: 16px 22px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    max-height: 420px;
    overflow-y: auto;
  }
  .project-card {
    display: block;
    text-decoration: none;
    padding: 13px 15px;
    border-radius: 10px;
    border: 1.5px solid #eee;
    transition: all 0.18s;
    position: relative;
    overflow: hidden;
  }
  .project-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
  }
  .project-card.vol::before { background: var(--red); }
  .project-card.int::before { background: var(--blue); }
  .project-card.teach::before { background: var(--purple); }
  .project-card:hover {
    border-color: var(--blue);
    background: #f8f9ff;
    transform: translateX(3px);
  }
  .project-card-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 4px;
  }
  .project-type-badge {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 20px;
  }
  .badge-vol { background: #fff0ee; color: var(--red); }
  .badge-int { background: #eef2ff; color: var(--blue); }
  .badge-teach { background: #f3eeff; color: var(--purple); }
  .project-duration {
    font-size: 10px;
    color: var(--muted);
  }
  .project-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.4;
  }
  .project-arrow {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 16px;
    color: #ccc;
    transition: color 0.15s, right 0.15s;
  }
  .project-card:hover .project-arrow {
    color: var(--blue);
    right: 10px;
  }

  /* MOBILE */
  @media (max-width: 600px) {
    header { padding: 14px 20px; }
    .hero { padding: 100px 20px 30px; }
    h1 { font-size: 28px; }
    .panel {
      top: auto;
      right: 0;
      bottom: -100%;
      left: 0;
      width: 100%;
      border-radius: 20px 20px 0 0;
      transform: none;
      transition: bottom 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .panel.open {
      right: 0;
      bottom: 0;
    }
    nav { display: none; }
  }

  /* SCROLLBAR */
  .panel-projects::-webkit-scrollbar { width: 4px; }
  .panel-projects::-webkit-scrollbar-track { background: transparent; }
  .panel-projects::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }

  /* BG STARS */
  .bg-stars {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .star {
    position: absolute;
    width: 1px; height: 1px;
    background: rgba(255,255,255,0.4);
    border-radius: 50%;
  }
</style>
</head>

<script>
// Star background
const starsEl = document.getElementById('stars');
for (let i = 0; i < 120; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  s.style.left = Math.random() * 100 + '%';
  s.style.top = Math.random() * 100 + '%';
  s.style.opacity = (Math.random() * 0.5 + 0.1).toFixed(2);
  s.style.width = s.style.height = (Math.random() * 2 + 0.5) + 'px';
  starsEl.appendChild(s);
}

const cities = {
  italien: {
    flag: '🇮🇹', country: 'Italien', region: 'Südeuropa',
    headerColor: '#F95440',
    projects: [
      { name: 'Equify – Liberamente', type: 'vol', duration: '6 Wochen', url: 'https://aiesec.de/project/equify-liberamente-italy' },
      { name: 'Global Classroom (Torino)', type: 'vol', duration: '6 Wochen', url: 'https://aiesec.de/project/global-classroom-torino-italy' },
      { name: 'Global Classroom', type: 'vol', duration: '6 Wochen', url: 'https://aiesec.de/project/global-classroom-italy' },

const typeLabel = { vol: 'Freiwillig', int: 'Praktikum', teach: 'Lehrpraktikum' };
const typeClass = { vol: 'badge-vol', int: 'badge-int', teach: 'badge-teach' };
const cardClass = { vol: 'vol', int: 'int', teach: 'teach' };

function openPanel(key) {
  const d = cities[key];
  if (!d) return;

  document.getElementById('panel-flag').textContent = d.flag;
  document.getElementById('panel-country').textContent = d.country;
  document.getElementById('panel-region').textContent = d.region;
  document.getElementById('panel-header').style.borderBottom = `3px solid ${d.headerColor}`;

  const vol = d.projects.filter(p => p.type === 'vol').length;
  const int = d.projects.filter(p => p.type === 'int').length;
  const teach = d.projects.filter(p => p.type === 'teach').length;
  document.getElementById('panel-stats').innerHTML = `
    <div class="stat"><div class="stat-num">${d.projects.length}</div><div class="stat-label">Projekte</div></div>
    ${vol ? `<div class="stat"><div class="stat-num" style="color:#F95440">${vol}</div><div class="stat-label">Freiwillig</div></div>` : ''}
    ${int ? `<div class="stat"><div class="stat-num" style="color:#0037E3">${int}</div><div class="stat-label">Praktikum</div></div>` : ''}
    ${teach ? `<div class="stat"><div class="stat-num" style="color:#7552CC">${teach}</div><div class="stat-label">Lehrpraktikum</div></div>` : ''}
  `;

  document.getElementById('panel-projects').innerHTML = d.projects.map(p => `
    <a href="${p.url}" target="_blank" class="project-card ${cardClass[p.type]}">
      <div class="project-card-top">
        <span class="project-type-badge ${typeClass[p.type]}">${typeLabel[p.type]}</span>
        <span class="project-duration">${p.duration}</span>
      </div>
      <div class="project-name">${p.name}</div>
      <span class="project-arrow">→</span>
    </a>
  `).join('');

  document.getElementById('panel').classList.add('open');
}

function closePanel() {
  document.getElementById('panel').classList.remove('open');
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closePanel(); });
</script>
